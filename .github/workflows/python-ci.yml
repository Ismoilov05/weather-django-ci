name: Django CI/CD Docker

on:
  push:
    branches: [ main, dev, feature/weather-ui ]
  pull_request:
    branches: [ main, dev, feature/weather-ui ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t weather-app .
      
    - name: Run container and test
      run: |
        docker run -d -p 8000:8000 --name test-container weather-app
        sleep 5
        curl http://localhost:8000/weather/Tashkent/

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations
      working-directory: weather_site
      run: python manage.py migrate

    - name: Run tests
      working-directory: weather_site
      run: python manage.py test